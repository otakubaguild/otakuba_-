<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#050505">
  <title>管理画面</title>
  <link rel="stylesheet" href="main.css?v=5.70-gacha">
  <link rel="stylesheet" href="admin.css?v=5.47-license">
</head>
<body>
  <div class="admin-bg"></div>
  <div class="app-brand-label" style="position:fixed;right:8px;bottom:calc(6px + env(safe-area-inset-bottom));z-index:9999;font-size:9px;letter-spacing:1px;color:rgba(255,246,223,.35);pointer-events:none;font-family:monospace;text-shadow:1px 1px 0 rgba(0,0,0,.6)">PLAY_ORDER</div>
  <div id="adminAuthFx"><div class="admin-auth-text">⚡ 管理者権限、発動——</div></div>
  <section id="adminLogin" class="login-wrap">
    <div class="panel login-card">
      <h1>🔐 管理者ログイン</h1>
      <p class="tiny">パスワードを入力してください</p>
      <input id="adminPass" type="password" placeholder="パスワード">
      <button class="btn gold mt" id="adminLoginBtn">ログイン</button>
      <div id="loginError" class="redtxt mt"></div>
      <button class="btn small mt" id="adminBackToIndex">一般画面へ戻る</button>
    </div>
  </section>
  <main id="adminApp" class="admin-app hidden">
    <header class="admin-head">
      <h1 id="adminHeadTitle">管理室</h1>
      <span id="bizStatusBadge" class="biz-badge">🔴 準備中</span>
      <button class="btn small" id="btnShowTerms">📜 利用規約</button>
      <button class="btn small" id="adminHeaderToIndex">一般画面</button>
      <button class="btn red small" id="logoutBtn">ログアウト</button>
    </header>
    <nav class="admin-modebar" id="adminModeBar"></nav>
    <nav class="admin-tabs" id="adminTabs"></nav>
    <section class="panel admin-content" id="adminContent"></section>
    <div id="toast" class="toast"></div>
  </main>
  <div class="modal" id="modalTerms" style="z-index:99999;position:fixed">
    <div class="modal-head">
      <h2>📜 利用規約</h2>
    </div>
    <div class="scroll">
      <div class="panel">
        <div id="termsBody" class="confirm-text" style="text-align:left;line-height:1.7"></div>
        <div class="row mt">
          <button class="btn gold" id="btnCloseTerms">閉じる</button>
        </div>
      </div>
    </div>
  </div>
  <script src="theme.js?v=5.50-themefix"></script>
  <script src="terms.js?v=1.0"></script>
  <script src="utils.js?v=5.41-8bitfull"></script>
  <script src="license-config.js?v=1.0"></script>
  <script src="license.js?v=1.0"></script>
  <script src="storage.js?v=5.70-gacha"></script>
  <script src="discord.js?v=1.0"></script>
  <script src="admin.js?v=5.71-gachapercent"></script>
  <script>
    // iOSのSafariは「戻る」操作でページをJSごとそのまま復元(bfcache)することがあり、
    // その場合ここまでのスクリプトが再実行されず、切り替え前の古いテーマ・古いデータが
    // 表示されたままになってしまう。bfcacheから復元されたと分かったら、強制的に再読み込みして
    // 常に最新のテーマ・データで開き直すようにする。
    window.addEventListener('pageshow', function(ev){
      if(ev.persisted){ location.reload(); }
    });
  </script>
</body>
</html>
